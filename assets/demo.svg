<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 480" fill="none">
  <style>
    @keyframes t1{0%,4%{opacity:0}5%,100%{opacity:1}}
    @keyframes t2{0%,9%{opacity:0}10%,100%{opacity:1}}
    @keyframes t3{0%,14%{opacity:0}15%,100%{opacity:1}}
    @keyframes t4{0%,19%{opacity:0}20%,100%{opacity:1}}
    @keyframes t5{0%,24%{opacity:0}25%,100%{opacity:1}}
    @keyframes t6{0%,30%{opacity:0}31%,100%{opacity:1}}
    @keyframes t7{0%,35%{opacity:0}36%,100%{opacity:1}}
    @keyframes t8{0%,40%{opacity:0}41%,100%{opacity:1}}
    @keyframes t9{0%,45%{opacity:0}46%,100%{opacity:1}}
    @keyframes t10{0%,50%{opacity:0}51%,100%{opacity:1}}
    @keyframes t11{0%,55%{opacity:0}56%,100%{opacity:1}}
    @keyframes t12{0%,60%{opacity:0}61%,100%{opacity:1}}
    @keyframes t13{0%,65%{opacity:0}66%,100%{opacity:1}}
    @keyframes t14{0%,70%{opacity:0}71%,100%{opacity:1}}
    @keyframes t15{0%,75%{opacity:0}76%,100%{opacity:1}}
    @keyframes cursor{0%,49%{opacity:1}50%,100%{opacity:0}}
    .l1{animation:t1 8s both}.l2{animation:t2 8s both}.l3{animation:t3 8s both}
    .l4{animation:t4 8s both}.l5{animation:t5 8s both}.l6{animation:t6 8s both}
    .l7{animation:t7 8s both}.l8{animation:t8 8s both}.l9{animation:t9 8s both}
    .l10{animation:t10 8s both}.l11{animation:t11 8s both}.l12{animation:t12 8s both}
    .l13{animation:t13 8s both}.l14{animation:t14 8s both}.l15{animation:t15 8s both}
    text{font-family:'JetBrains Mono','Cascadia Code','Fira Code',monospace;font-size:13px}
    .dim{fill:#6b7280}.grn{fill:#4ade80}.red{fill:#f87171}.ylw{fill:#fbbf24}
    .blu{fill:#60a5fa}.wht{fill:#e5e7eb}.bld{font-weight:700}
  </style>

  <!-- Window -->
  <rect width="720" height="480" rx="10" fill="#0f1117"/>
  <rect width="720" height="36" rx="10" fill="#1a1b26"/>
  <rect y="26" width="720" height="10" fill="#1a1b26"/>
  <circle cx="20" cy="18" r="6" fill="#ff5f57"/>
  <circle cx="40" cy="18" r="6" fill="#febc2e"/>
  <circle cx="60" cy="18" r="6" fill="#28c840"/>
  <text x="340" y="22" text-anchor="middle" class="dim" font-size="12">codediag — Terminal</text>

  <!-- Command -->
  <g class="l1">
    <text x="20" y="62" class="grn">$</text>
    <text x="36" y="62" class="wht">npx codediag scan .</text>
  </g>

  <!-- Spinner results -->
  <g class="l2"><text x="20" y="90" class="dim">✔ Stack: nestjs + typescript + prisma</text></g>
  <g class="l3"><text x="20" y="110" class="dim">✔ API Health: 78/100</text></g>
  <g class="l4"><text x="20" y="130" class="dim">✔ Security: 92/100</text></g>
  <g class="l5"><text x="20" y="150" class="dim">✔ Dependencies: 91/100</text></g>
  <g class="l6"><text x="20" y="170" class="dim">✔ Testing: 82/100</text></g>
  <g class="l7"><text x="20" y="190" class="dim">✔ Structure: 88/100</text></g>

  <!-- Report header -->
  <g class="l8">
    <text x="30" y="222" class="wht bld">codediag</text>
    <text x="120" y="222" class="dim">— Diagnostic Report</text>
  </g>

  <!-- Project info -->
  <g class="l9">
    <text x="30" y="250" class="dim">Project:</text><text x="120" y="250" class="wht">my-nestjs-app</text>
    <text x="30" y="268" class="dim">Stack:</text><text x="120" y="268" class="wht">nestjs + typescript + prisma</text>
    <text x="30" y="286" class="dim">Score:</text><text x="120" y="286" class="grn bld">B+</text><text x="150" y="286" class="dim">(87/100)</text>
  </g>

  <!-- Score bars -->
  <g class="l10">
    <text x="30" y="316" class="dim">API Health</text>
    <text x="160" y="316" class="grn">███████████████</text><text x="394" y="316" class="dim">░░░░░</text><text x="476" y="316" class="wht bld"> 78</text>
  </g>
  <g class="l11">
    <text x="30" y="336" class="dim">Security</text>
    <text x="160" y="336" class="grn">██████████████████</text><text x="442" y="336" class="dim">░░</text><text x="476" y="336" class="wht bld"> 92</text>
  </g>
  <g class="l12">
    <text x="30" y="356" class="dim">Dependencies</text>
    <text x="160" y="356" class="grn">██████████████████</text><text x="442" y="356" class="dim">░░</text><text x="476" y="356" class="wht bld"> 91</text>
  </g>
  <g class="l13">
    <text x="30" y="376" class="dim">Testing</text>
    <text x="160" y="376" class="grn">████████████████</text><text x="410" y="376" class="dim">░░░░</text><text x="476" y="376" class="wht bld"> 82</text>
  </g>

  <!-- Issues -->
  <g class="l14">
    <text x="30" y="410" class="red">✖</text><text x="48" y="410" class="wht">POST /users has no auth guard</text>
    <text x="48" y="428" class="dim">→ Add @UseGuards(AuthGuard)</text>
  </g>
  <g class="l15">
    <text x="30" y="456" class="ylw">⚠</text><text x="48" y="456" class="wht">No rate limiting detected</text>
    <text x="48" y="474" class="dim">→ Install @nestjs/throttler</text>
  </g>
</svg>

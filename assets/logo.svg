<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" fill="none">
  <rect width="120" height="120" rx="24" fill="#1a1a2e"/>
  <g transform="translate(24, 28)">
    <!-- Stethoscope shape - code diagnostics metaphor -->
    <!-- Top arc -->
    <path d="M20 8 C20 8 20 0 28 0 L44 0 C52 0 52 8 52 8" stroke="#6ee7b7" stroke-width="4" stroke-linecap="round" fill="none"/>
    <!-- Left tube -->
    <line x1="20" y1="8" x2="20" y2="36" stroke="#6ee7b7" stroke-width="4" stroke-linecap="round"/>
    <!-- Right tube -->
    <line x1="52" y1="8" x2="52" y2="28" stroke="#6ee7b7" stroke-width="4" stroke-linecap="round"/>
    <!-- Merge point -->
    <path d="M20 36 Q20 48 36 48 Q52 48 52 28" stroke="#6ee7b7" stroke-width="4" stroke-linecap="round" fill="none"/>
    <!-- Chest piece (circle) -->
    <circle cx="36" cy="56" r="8" stroke="#6ee7b7" stroke-width="4" fill="none"/>
    <line x1="36" y1="48" x2="36" y2="48" stroke="#6ee7b7" stroke-width="4" stroke-linecap="round"/>
    <!-- Code brackets inside circle -->
    <text x="36" y="60" text-anchor="middle" font-family="monospace" font-size="10" font-weight="bold" fill="#6ee7b7">&lt;/&gt;</text>
  </g>
</svg>
